version: "3.9"

# Deployed on standalone CDN Droplets — one node per Droplet
# Required env vars: NODE_ID, NODE_NAME, NODE_LOCATION, NODE_PORT, ORIGIN_URL, NODE_PUBLIC_URL

services:
  cdn-node:
    build:
      context: ./cdn-node-${CDN_NODE_NUMBER}
    container_name: netflix_cdn
    restart: always
    environment:
      NODE_ID: ${NODE_ID}
      NODE_NAME: ${NODE_NAME}
      NODE_LOCATION: ${NODE_LOCATION}
      NODE_PORT: ${NODE_PORT}
      ORIGIN_URL: ${ORIGIN_URL}
      NODE_PUBLIC_URL: ${NODE_PUBLIC_URL}
      CACHE_PATH: /cache
    volumes:
      - cdn_cache:/cache
    ports:
      - "${NODE_PORT}:${NODE_PORT}"

volumes:
  cdn_cache:
