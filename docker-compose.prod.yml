version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: netflix_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./seed_data.sql:/seed_data.sql
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: netflix_redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  origin:
    build:
      context: ./origin
    container_name: netflix_origin
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      VIDEO_STORAGE_PATH: /videos
      SECRET_KEY: ${SECRET_KEY}
      TMDB_API_KEY: ${TMDB_API_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      VIDEO_STORAGE_BACKEND: s3
      S3_MEDIA_ROOT: ${S3_MEDIA_ROOT:-netflix}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - video_data:/videos
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  cdn-node-1:
    build:
      context: ./cdn-node-1
    container_name: netflix_cdn_1
    restart: always
    environment:
      NODE_ID: cdn-node-1
      NODE_NAME: edge-dhaka
      NODE_LOCATION: dhaka
      NODE_PORT: "3001"
      ORIGIN_URL: http://origin:8000
      # Public URL that browsers can reach — set to your Droplet's Reserved IP
      NODE_PUBLIC_URL: ${CDN1_PUBLIC_URL}
      CACHE_PATH: /cache
    volumes:
      - cdn1_cache:/cache
      - video_data:/videos:ro
    expose:
      - "3001"
    ports:
      - "3001:3001"
    depends_on:
      origin:
        condition: service_healthy

  cdn-node-2:
    build:
      context: ./cdn-node-2
    container_name: netflix_cdn_2
    restart: always
    environment:
      NODE_ID: cdn-node-2
      NODE_NAME: edge-chittagong
      NODE_LOCATION: chittagong
      NODE_PORT: "3002"
      ORIGIN_URL: http://origin:8000
      NODE_PUBLIC_URL: ${CDN2_PUBLIC_URL}
      CACHE_PATH: /cache
    volumes:
      - cdn2_cache:/cache
      - video_data:/videos:ro
    expose:
      - "3002"
    ports:
      - "3002:3002"
    depends_on:
      origin:
        condition: service_healthy

  cdn-node-3:
    build:
      context: ./cdn-node-3
    container_name: netflix_cdn_3
    restart: always
    environment:
      NODE_ID: cdn-node-3
      NODE_NAME: edge-sylhet
      NODE_LOCATION: sylhet
      NODE_PORT: "3003"
      ORIGIN_URL: http://origin:8000
      NODE_PUBLIC_URL: ${CDN3_PUBLIC_URL}
      CACHE_PATH: /cache
    volumes:
      - cdn3_cache:/cache
      - video_data:/videos:ro
    expose:
      - "3003"
    ports:
      - "3003:3003"
    depends_on:
      origin:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    container_name: netflix_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - origin

volumes:
  video_data:
  cdn1_cache:
  cdn2_cache:
  cdn3_cache:
  postgres_data:
