server {
    listen 80;
    server_name _ netflix.devomatic.dev;
    return 301 https://netflix.devomatic.dev$request_uri;
}

server {
    listen 443 ssl;
    server_name netflix.devomatic.dev;

    ssl_certificate     /etc/letsencrypt/live/netflix.devomatic.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netflix.devomatic.dev/privkey.pem;

    client_max_body_size 2000m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to origin
    location /api/ {
        proxy_pass         http://origin:8000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Authorization $http_authorization;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # CDN node proxies — browser talks HTTPS to here, nginx forwards to CDN over HTTP
    location /cdn1/ {
        proxy_pass http://143.110.246.92:3001/;
        proxy_read_timeout 120s;
    }
    location /cdn2/ {
        proxy_pass http://143.198.235.98:3002/;
        proxy_read_timeout 120s;
    }
    location /cdn3/ {
        proxy_pass http://206.189.48.68:3003/;
        proxy_read_timeout 120s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass         http://origin:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
