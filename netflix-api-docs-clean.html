<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Netflix Video Streaming Module — API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <style>
    body { margin: 0; padding: 0; background: #fafafa; }
    #swagger-ui .topbar { display: none; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    const yamlSpec = "openapi: 3.0.3\ninfo:\n  title: Netflix Video Streaming Module API\n  description: 'REST API documentation for the Netflix Video Streaming Module.\n\n\n    Covers five features: Adaptive Streaming, Playback Sync, Multi-Audio & Subtitle System, Intelligent Buffering & Preloading,\n    and Instant Previews.\n\n\n    **User Tiers:**\n\n    - Standard User \u2014 Resolution up to 1080p\n\n    - Premium User \u2014 Resolution up to 4K (2160p)\n\n\n    All endpoints require a valid Bearer token.'\n  version: 1.0.0\n  contact:\n    name: Netflix Video Streaming Team\n    email: streaming-api@netflix.example.com\n  license:\n    name: Proprietary\n    url: https://netflix.example.com/license\nservers:\n- url: https://api.netflix.example.com/v1\n  description: Production\n- url: https://staging-api.netflix.example.com/v1\n  description: Staging\n- url: http://localhost:8080/v1\n  description: Local Development\ntags:\n- name: Streaming\n  description: Feature 1 \u2014 Adaptive Streaming (stream initialization, chunk delivery, resolution management)\n- name: Playback Sync\n  description: Feature 2 \u2014 Playback position sync and resume across devices\n- name: Audio & Subtitles\n  description: Feature 3 \u2014 Multi-audio track and subtitle file management\n- name: Buffering & Preloading\n  description: Feature 4 \u2014 Intelligent buffer monitoring and next-episode preloading\n- name: Previews\n  description: Feature 5 \u2014 Instant trailer previews on hover\n- name: Episodes\n  description: Episode and series metadata retrieval\n- name: User Preferences\n  description: User-level playback preferences (audio, subtitle, resolution)\nsecurity:\n- BearerAuth: []\npaths:\n  /series/{seriesId}:\n    get:\n      tags:\n      - Episodes\n      operationId: getSeriesMetadata\n      summary: Get series metadata\n      description: Retrieves full metadata for a series including title, seasons, genre, and available episode list.\n      parameters:\n      - $ref: '#/components/parameters/SeriesId'\n      responses:\n        '200':\n          description: Series metadata retrieved successfully\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Series'\n              example:\n                seriesId: ser_8a2f3c\n                title: Stranger Things\n                genre:\n                - Sci-Fi\n                - Drama\n                - Horror\n                maturityRating: TV-14\n                totalSeasons: 4\n                seasons:\n                - seasonNumber: 1\n                  episodeCount: 8\n                  episodes:\n                  - episodeId: ep_001\n                    title: 'Chapter One: The Vanishing of Will Byers'\n                    durationMs: 2880000\n                    episodeNumber: 1\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /episodes/{episodeId}:\n    get:\n      tags:\n      - Episodes\n      operationId: getEpisodeMetadata\n      summary: Get episode metadata\n      description: Retrieves detailed metadata for a specific episode, including available resolutions, audio tracks, subtitle\n        files, and trailer info.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      responses:\n        '200':\n          description: Episode metadata retrieved successfully\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Episode'\n              example:\n                episodeId: ep_001\n                seriesId: ser_8a2f3c\n                title: 'Chapter One: The Vanishing of Will Byers'\n                seasonNumber: 1\n                episodeNumber: 1\n                durationMs: 2880000\n                availableResolutions:\n                - 360p\n                - 720p\n                - 1080p\n                - 4K\n                audioTracks:\n                - trackId: aud_en\n                  language: English\n                  codec: AAC\n                - trackId: aud_es\n                  language: Spanish\n                  codec: AAC\n                subtitleFiles:\n                - fileId: sub_en\n                  language: English\n                  format: WebVTT\n                - fileId: sub_es\n                  language: Spanish\n                  format: WebVTT\n                nextEpisodeId: ep_002\n                trailerId: trl_8a2f3c\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /episodes/{episodeId}/next:\n    get:\n      tags:\n      - Episodes\n      operationId: getNextEpisode\n      summary: Get next episode info\n      description: Returns metadata for the next episode in sequence. Returns 404 if this is the last episode of the series.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      responses:\n        '200':\n          description: Next episode metadata\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Episode'\n        '404':\n          description: No next episode available (last episode of series)\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n              example:\n                code: NO_NEXT_EPISODE\n                message: This is the last episode of the series\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/init:\n    post:\n      tags:\n      - Streaming\n      operationId: initializeStream\n      summary: Initialize a video stream session\n      description: Initializes a new streaming session for the given content at the requested resolution. The server provisions\n        CDN resources and returns a session token with the manifest URL for chunked delivery.\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/StreamInitRequest'\n            example:\n              episodeId: ep_001\n              initialResolution: 1080p\n              deviceType: smart_tv\n              preferredCdn: edge-us-west-2\n      responses:\n        '201':\n          description: Stream session created\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/StreamSession'\n              example:\n                sessionId: sess_a1b2c3d4\n                episodeId: ep_001\n                manifestUrl: https://cdn.netflix.example.com/manifest/ep_001/1080p.mpd\n                currentResolution: 1080p\n                cdnNode: edge-us-west-2\n                maxResolution: 4K\n                sessionExpiry: '2026-02-28T14:30:00Z'\n                status: ready\n        '400':\n          $ref: '#/components/responses/BadRequest'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n        '403':\n          description: Resolution not allowed for user's subscription tier\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n              example:\n                code: RESOLUTION_NOT_ALLOWED\n                message: 4K resolution requires a Premium subscription\n        '429':\n          $ref: '#/components/responses/TooManyRequests'\n  /stream/{sessionId}/chunks/{chunkIndex}:\n    get:\n      tags:\n      - Streaming\n      operationId: getStreamChunk\n      summary: Fetch a video chunk\n      description: Retrieves a specific video chunk by index at the requested resolution. Chunks may be served from CDN edge\n        cache or origin server.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      - name: chunkIndex\n        in: path\n        required: true\n        description: Zero-based index of the video chunk\n        schema:\n          type: integer\n          minimum: 0\n          example: 42\n      - name: resolution\n        in: query\n        required: false\n        description: Desired resolution for this chunk. If omitted, uses the session's current resolution.\n        schema:\n          $ref: '#/components/schemas/Resolution'\n      responses:\n        '200':\n          description: Video chunk binary data\n          headers:\n            X-Chunk-Source:\n              description: Whether chunk was served from CDN cache or origin\n              schema:\n                type: string\n                enum:\n                - cdn-cache\n                - origin\n            X-Chunk-Duration-Ms:\n              description: Duration of this chunk in milliseconds\n              schema:\n                type: integer\n                example: 4000\n            X-Chunk-Byte-Size:\n              description: Size of chunk in bytes\n              schema:\n                type: integer\n                example: 2097152\n          content:\n            video/mp4:\n              schema:\n                type: string\n                format: binary\n        '404':\n          description: Chunk not found or session expired\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/{sessionId}/resolution:\n    put:\n      tags:\n      - Streaming\n      operationId: updateStreamResolution\n      summary: Update stream resolution (adaptive bitrate)\n      description: Updates the streaming resolution for an active session based on bandwidth conditions or user preference.\n        Standard users are capped at 1080p, Premium users can select up to 4K.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required:\n              - resolution\n              properties:\n                resolution:\n                  $ref: '#/components/schemas/Resolution'\n                reason:\n                  type: string\n                  description: Reason for resolution change\n                  enum:\n                  - auto_bandwidth\n                  - user_manual\n                  - initial_selection\n                  example: auto_bandwidth\n                measuredBandwidthKbps:\n                  type: integer\n                  description: Current measured bandwidth in kbps\n                  example: 15000\n      responses:\n        '200':\n          description: Resolution updated successfully\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  sessionId:\n                    type: string\n                  previousResolution:\n                    $ref: '#/components/schemas/Resolution'\n                  currentResolution:\n                    $ref: '#/components/schemas/Resolution'\n                  effectiveFromChunk:\n                    type: integer\n                    description: Chunk index from which the new resolution takes effect\n              example:\n                sessionId: sess_a1b2c3d4\n                previousResolution: 1080p\n                currentResolution: 720p\n                effectiveFromChunk: 43\n        '403':\n          description: Resolution exceeds subscription tier limit\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n              example:\n                code: RESOLUTION_NOT_ALLOWED\n                message: Standard tier is limited to 1080p\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/{sessionId}/bandwidth:\n    get:\n      tags:\n      - Streaming\n      operationId: getBandwidthSample\n      summary: Get current bandwidth measurement\n      description: Returns the latest bandwidth measurement for the active session, used to evaluate if a resolution change\n        is needed.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      responses:\n        '200':\n          description: Current bandwidth measurement\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/BandwidthSample'\n              example:\n                sessionId: sess_a1b2c3d4\n                currentBandwidthKbps: 15000\n                averageBandwidthKbps: 18000\n                peakBandwidthKbps: 25000\n                jitterMs: 12\n                measuredAt: '2026-02-28T13:45:30Z'\n                recommendedResolution: 1080p\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/{sessionId}:\n    delete:\n      tags:\n      - Streaming\n      operationId: terminateStream\n      summary: Terminate a streaming session\n      description: Gracefully terminates a streaming session, releasing CDN resources.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      responses:\n        '204':\n          description: Stream session terminated successfully\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n        '404':\n          $ref: '#/components/responses/NotFound'\n  /users/{userId}/playback-position/{contentId}:\n    get:\n      tags:\n      - Playback Sync\n      operationId: getPlaybackPosition\n      summary: Get saved playback position\n      description: Retrieves the last saved playback position for a user and content combination. Returns null for positionMs\n        if the user has never watched this content.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      - $ref: '#/components/parameters/ContentId'\n      responses:\n        '200':\n          description: Playback position retrieved\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/PlaybackPosition'\n              examples:\n                resuming:\n                  summary: User has previous progress\n                  value:\n                    userId: usr_12345\n                    contentId: ep_001\n                    positionMs: 1523000\n                    durationMs: 2880000\n                    progressPercent: 52.88\n                    updatedAt: '2026-02-27T22:15:00Z'\n                    isComplete: false\n                firstTime:\n                  summary: First time watching\n                  value:\n                    userId: usr_12345\n                    contentId: ep_002\n                    positionMs: null\n                    durationMs: 2880000\n                    progressPercent: 0\n                    updatedAt: null\n                    isComplete: false\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n        '404':\n          $ref: '#/components/responses/NotFound'\n    put:\n      tags:\n      - Playback Sync\n      operationId: updatePlaybackPosition\n      summary: Sync playback position\n      description: Updates the playback position for a user's content. Called periodically (every 10 seconds) during active\n        playback.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      - $ref: '#/components/parameters/ContentId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required:\n              - positionMs\n              properties:\n                positionMs:\n                  type: integer\n                  description: Current playback position in milliseconds\n                  minimum: 0\n                  example: 1523000\n                sessionId:\n                  type: string\n                  description: Active stream session ID for validation\n                  example: sess_a1b2c3d4\n      responses:\n        '200':\n          description: Position updated successfully\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  status:\n                    type: string\n                    example: synced\n                  positionMs:\n                    type: integer\n                    example: 1523000\n                  updatedAt:\n                    type: string\n                    format: date-time\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /users/{userId}/watched/{contentId}:\n    post:\n      tags:\n      - Playback Sync\n      operationId: markAsWatched\n      summary: Mark content as watched\n      description: Marks an episode as fully watched when playback reaches 100%.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      - $ref: '#/components/parameters/ContentId'\n      responses:\n        '200':\n          description: Content marked as watched\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  userId:\n                    type: string\n                  contentId:\n                    type: string\n                  watchedAt:\n                    type: string\n                    format: date-time\n                  nextEpisodeId:\n                    type: string\n                    nullable: true\n                    description: ID of the next episode, or null if this was the last\n              example:\n                userId: usr_12345\n                contentId: ep_001\n                watchedAt: '2026-02-28T14:00:00Z'\n                nextEpisodeId: ep_002\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n        '409':\n          description: Content already marked as watched\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n              example:\n                code: ALREADY_WATCHED\n                message: This content was already marked as watched\n  /episodes/{episodeId}/audio-tracks:\n    get:\n      tags:\n      - Audio & Subtitles\n      operationId: listAudioTracks\n      summary: List available audio tracks\n      description: Returns all available audio tracks for an episode.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      responses:\n        '200':\n          description: Available audio tracks\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  episodeId:\n                    type: string\n                  audioTracks:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/AudioTrack'\n              example:\n                episodeId: ep_001\n                audioTracks:\n                - trackId: aud_en\n                  language: English\n                  languageCode: en\n                  codec: AAC\n                  channels: '5.1'\n                  isDefault: true\n                - trackId: aud_es\n                  language: Spanish\n                  languageCode: es\n                  codec: AAC\n                  channels: '5.1'\n                  isDefault: false\n                - trackId: aud_ja\n                  language: Japanese\n                  languageCode: ja\n                  codec: AAC\n                  channels: '2.0'\n                  isDefault: false\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /episodes/{episodeId}/audio-tracks/{trackId}:\n    get:\n      tags:\n      - Audio & Subtitles\n      operationId: getAudioTrack\n      summary: Get audio track data\n      description: Fetches the streaming URL and metadata for a specific audio track.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      - name: trackId\n        in: path\n        required: true\n        schema:\n          type: string\n        description: Audio track identifier\n        example: aud_en\n      responses:\n        '200':\n          description: Audio track details and stream URL\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AudioTrackDetail'\n              example:\n                trackId: aud_en\n                language: English\n                languageCode: en\n                codec: AAC\n                channels: '5.1'\n                bitrateKbps: 384\n                streamUrl: https://cdn.netflix.example.com/audio/ep_001/en_5.1.m4a\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /episodes/{episodeId}/subtitles:\n    get:\n      tags:\n      - Audio & Subtitles\n      operationId: listSubtitleFiles\n      summary: List available subtitle files\n      description: Returns all available subtitle files for an episode.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      responses:\n        '200':\n          description: Available subtitle files\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  episodeId:\n                    type: string\n                  subtitleFiles:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/SubtitleFile'\n              example:\n                episodeId: ep_001\n                subtitleFiles:\n                - fileId: sub_en\n                  language: English\n                  languageCode: en\n                  format: WebVTT\n                  isCC: false\n                - fileId: sub_en_cc\n                  language: English [CC]\n                  languageCode: en\n                  format: WebVTT\n                  isCC: true\n                - fileId: sub_es\n                  language: Spanish\n                  languageCode: es\n                  format: WebVTT\n                  isCC: false\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /episodes/{episodeId}/subtitles/{fileId}:\n    get:\n      tags:\n      - Audio & Subtitles\n      operationId: getSubtitleTrack\n      summary: Get subtitle file data\n      description: Fetches the subtitle file URL and metadata for a specific subtitle track.\n      parameters:\n      - $ref: '#/components/parameters/EpisodeId'\n      - name: fileId\n        in: path\n        required: true\n        schema:\n          type: string\n        description: Subtitle file identifier\n        example: sub_en\n      responses:\n        '200':\n          description: Subtitle file details and URL\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/SubtitleFileDetail'\n              example:\n                fileId: sub_en\n                language: English\n                languageCode: en\n                format: WebVTT\n                isCC: false\n                fileUrl: https://cdn.netflix.example.com/subs/ep_001/en.vtt\n        '404':\n          $ref: '#/components/responses/NotFound'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /users/{userId}/preferences/audio:\n    get:\n      tags:\n      - User Preferences\n      operationId: getUserAudioPreference\n      summary: Get user's audio preference\n      description: Retrieves the user's saved audio language preference.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      responses:\n        '200':\n          description: User audio preference\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserAudioPreference'\n              example:\n                userId: usr_12345\n                preferredLanguageCode: en\n                preferredChannels: '5.1'\n                updatedAt: '2026-02-27T10:00:00Z'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n    put:\n      tags:\n      - User Preferences\n      operationId: saveUserAudioPreference\n      summary: Save user's audio preference\n      description: Persists the user's audio track preference.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required:\n              - trackId\n              properties:\n                trackId:\n                  type: string\n                  example: aud_en\n      responses:\n        '200':\n          description: Audio preference saved\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  status:\n                    type: string\n                    example: saved\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /users/{userId}/preferences/subtitle:\n    get:\n      tags:\n      - User Preferences\n      operationId: getUserSubtitlePreference\n      summary: Get user's subtitle preference\n      description: Retrieves the user's saved subtitle language preference.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      responses:\n        '200':\n          description: User subtitle preference\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserSubtitlePreference'\n              example:\n                userId: usr_12345\n                preferredLanguageCode: en\n                preferredCC: false\n                subtitlesEnabled: true\n                updatedAt: '2026-02-27T10:00:00Z'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n    put:\n      tags:\n      - User Preferences\n      operationId: saveUserSubtitlePreference\n      summary: Save user's subtitle preference\n      description: Persists the user's subtitle file preference.\n      parameters:\n      - $ref: '#/components/parameters/UserId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required:\n              - fileId\n              properties:\n                fileId:\n                  type: string\n                  example: sub_en\n      responses:\n        '200':\n          description: Subtitle preference saved\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  status:\n                    type: string\n                    example: saved\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/{sessionId}/buffer/status:\n    get:\n      tags:\n      - Buffering & Preloading\n      operationId: getBufferStatus\n      summary: Get buffer health status\n      description: Returns the current buffer health metrics for an active streaming session.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      responses:\n        '200':\n          description: Buffer status\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/BufferStatus'\n              example:\n                sessionId: sess_a1b2c3d4\n                bufferedDurationMs: 30000\n                bufferHealthPercent: 75.0\n                minThresholdMs: 10000\n                maxThresholdMs: 60000\n                status: healthy\n                currentChunkIndex: 42\n                totalChunksBuffered: 8\n                totalChunksAvailable: 720\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n        '404':\n          $ref: '#/components/responses/NotFound'\n  /stream/{sessionId}/buffer/request-chunks:\n    post:\n      tags:\n      - Buffering & Preloading\n      operationId: requestMoreChunks\n      summary: Request additional chunks for buffering\n      description: Requests the streaming engine to fetch and buffer additional chunks ahead of the current playback position.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              properties:\n                fromChunkIndex:\n                  type: integer\n                  description: Start fetching from this chunk index\n                  example: 50\n                chunkCount:\n                  type: integer\n                  description: Number of chunks to fetch ahead\n                  minimum: 1\n                  maximum: 50\n                  example: 10\n                resolution:\n                  $ref: '#/components/schemas/Resolution'\n      responses:\n        '202':\n          description: Chunk fetch request accepted\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  status:\n                    type: string\n                    example: fetching\n                  chunksRequested:\n                    type: integer\n                    example: 10\n                  estimatedCompletionMs:\n                    type: integer\n                    example: 2000\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n  /stream/{sessionId}/preload/next-episode:\n    post:\n      tags:\n      - Buffering & Preloading\n      operationId: preloadNextEpisode\n      summary: Prefetch next episode chunks\n      description: Triggers preloading of the next episode's initial chunks into CDN edge cache when the current episode is\n        near completion.\n      parameters:\n      - $ref: '#/components/parameters/SessionId'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required:\n              - nextEpisodeId\n              properties:\n                nextEpisodeId:\n                  type: string\n                  description: ID of the next episode to preload\n                  example: ep_002\n                chunkCount:\n                  type: integer\n                  description: Number of initial chunks to preload\n                  minimum: 1\n                  maximum: 20\n                  default: 5\n                  example: 5\n                resolution:\n                  $ref: '#/components/schemas/Resolution'\n      responses:\n        '202':\n          description: Preload initiated\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  status:\n                    type: string\n                    enum:\n                    - preloading\n                    - already_cached\n                  nextEpisodeId:\n                    type: string\n                  chunksToPreload:\n                    type: integer\n                  estimatedReadyMs:\n                    type: integer\n              example:\n                status: preloading\n                nextEpisodeId: ep_002\n                chunksToPreload: 5\n                estimatedReadyMs: 3000\n        '404':\n          description: Next episode not found\n          co
